version: '3.8'

# ── GOIES Local Dev Stack ─────────────────────────────────────────────────────
# Usage:
#   docker-compose up -d --build
#   docker exec -it goies-ollama ollama pull llama3.2
#   Open http://localhost:8000

services:

  goies-backend:
    build: .
    container_name: goies-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PORT=8000
    depends_on:
      - ollama
    networks:
      - goies-net
    volumes:
      - ./goies_snapshots:/app/goies_snapshots
      - goies_data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: goies-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - goies-net
    restart: unless-stopped

networks:
  goies-net:
    driver: bridge

volumes:
  ollama_data:
  goies_data:
